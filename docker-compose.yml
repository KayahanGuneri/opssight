services:
  opssight-postgres:
    image: postgres:16
    container_name: opssight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opssight_case_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5543:5432"
    volumes:
      - opssight_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opssight_case_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  opssight_postgres_data:
